version: "3.9"

services:
  web-system-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-system-core
    ports:
      - "${APP_PORT:-5050}:5050"
    environment:
      NODE_ENV: production
      PORT: 5050
      DATABASE_URL: ./db/local.db
    volumes:
      - ./db:/app/db
    restart: unless-stopped

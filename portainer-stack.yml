version: "3.9"

services:
  web-system-core:
    # Prefer pulling a named image for Portainer stacks. Build if you push an image to a registry.
    image: cmtrkr83/web-system-core:latest
    container_name: web-system-core
    ports:
      - "${APP_PORT:-5050}:5050"
    environment:
      NODE_ENV: production
      PORT: 5050
      DATABASE_URL: /app/db/local.db
    volumes:
      - web-system-db:/app/db
    restart: unless-stopped

volumes:
  web-system-db:
